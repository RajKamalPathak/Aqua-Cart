<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Aqua Cart | Client Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 2rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.2rem;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
      }

      .brand-name {
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      .brand-sub {
        font-size: 0.7rem;
        color: #9ca3af;
      }

      h2 {
        font-size: 1.25rem;
        margin-bottom: 0.4rem;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #9ca3af;
        margin-bottom: 1.3rem;
      }

      .form-group {
        margin-bottom: 0.9rem;
      }

      .form-group label {
        font-size: 0.75rem;
        color: #9ca3af;
        display: block;
        margin-bottom: 0.25rem;
      }

      .form-group input {
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #020617;
        color: #e5e7eb;
        font-size: 0.9rem;
      }

      .form-group input:focus {
        outline: none;
        border-color: #38bdf8;
      }

      .btn-primary {
        width: 100%;
        padding: 0.6rem;
        border-radius: 999px;
        border: none;
        background: #38bdf8;
        color: #020617;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        margin-top: 0.6rem;
      }

      .btn-primary:hover {
        background: #0ea5e9;
      }

      .msg {
        margin-top: 0.7rem;
        font-size: 0.8rem;
        min-height: 1rem;
      }

      .msg.error {
        color: #f87171;
      }

      .msg.success {
        color: #4ade80;
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.8rem;
        color: #9ca3af;
        text-decoration: none;
      }

      .back-link:hover {
        color: #38bdf8;
      }
    </style>
  </head>

  <body>
    <div class="login-wrapper">
      <div class="brand">
        <div class="brand-mark">◇</div>
        <div>
          <div class="brand-name">Aqua Cart</div>
          <div class="brand-sub">Private Aquarium Collection</div>
        </div>
      </div>

      <h2>Client Login</h2>
      <p class="subtitle">Access your aquarium bookings</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" />
      </div>

      <button class="btn-primary" onclick="login()">Login</button>

      <p id="msg" class="msg"></p>

      <a href="Aqua Cart.html" class="back-link">← Back to Home</a>
    </div>

    <script>
      function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("msg");

        msg.textContent = "";
        msg.className = "msg";

        fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then((res) => {
            if (!res.ok)
              return res.text().then((t) => {
                throw new Error(t);
              });
            return res.json();
          })
          .then((data) => {
            localStorage.setItem("client_name", data.name);
            msg.textContent = "Login successful. Redirecting...";
            msg.classList.add("success");
            setTimeout(() => (window.location.href = "Aqua Cart.html"), 800);
          })
          .catch((err) => {
            msg.textContent = err.message || "Login failed";
            msg.classList.add("error");
          });
      }
    </script>
  </body>
</html>
